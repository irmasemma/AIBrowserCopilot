name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  build-extension:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:extension
      - uses: actions/upload-artifact@v4
        with:
          name: extension-build
          path: packages/extension/.output/chrome-mv3/

  build-native-host:
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            compile-script: compile:linux
            binary: ai-browser-copilot-linux-x64
          - os: ubuntu-latest
            target: linux-arm64
            compile-script: compile:linux-arm
            binary: ai-browser-copilot-linux-arm64
          - os: macos-latest
            target: macos-x64
            compile-script: compile:mac
            binary: ai-browser-copilot-macos-x64
          - os: macos-latest
            target: macos-arm64
            compile-script: compile:mac-arm
            binary: ai-browser-copilot-macos-arm64
          - os: windows-latest
            target: win-x64
            compile-script: compile:win
            binary: ai-browser-copilot-win-x64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run ${{ matrix.compile-script }} -w packages/native-host

      # Code signing placeholder — uncomment and configure when certificates are available
      # - name: Sign binary (macOS)
      #   if: runner.os == 'macOS'
      #   run: |
      #     codesign --sign "${{ secrets.APPLE_DEVELOPER_ID }}" \
      #       --options runtime \
      #       --timestamp \
      #       packages/native-host/bin/${{ matrix.binary }}
      # - name: Sign binary (Windows)
      #   if: runner.os == 'Windows'
      #   uses: dlemstra/code-sign-action@v1
      #   with:
      #     certificate: '${{ secrets.WINDOWS_SIGNING_CERT }}'
      #     password: '${{ secrets.WINDOWS_SIGNING_PASSWORD }}'
      #     files: packages/native-host/bin/${{ matrix.binary }}

      - uses: actions/upload-artifact@v4
        with:
          name: native-host-${{ matrix.target }}
          path: packages/native-host/bin/${{ matrix.binary }}

  create-release:
    runs-on: ubuntu-latest
    needs: [build-extension, build-native-host]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/native-host-*/*
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}

  # Chrome Web Store publish — uncomment when CWS credentials are configured
  # publish-extension:

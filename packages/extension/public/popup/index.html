<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Browser CoPilot</title>
  <style>
    body { width: 260px; margin: 0; padding: 12px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; background: #fff; }
    .status { display: flex; align-items: center; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #9CA3AF; }
    .dot.connected { background: #16A34A; }
    .label { font-weight: 500; color: #374151; font-size: 13px; }
    .btn { display: block; margin-top: 8px; width: 100%; padding: 6px; background: #2563EB; color: #fff; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; }
    .btn:hover { background: #1D4ED8; }
  </style>
</head>
<body>
  <div class="status">
    <span class="dot" id="statusDot"></span>
    <span class="label" id="statusLabel">Checking...</span>
  </div>
  <button class="btn" id="openPanel">Open Side Panel</button>
  <script src="popup.js"></script>
</body>
</html>
